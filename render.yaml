databases:
  - name: predictai-db
    databaseName: predictai
    user: predictai
    plan: starter

services:
  - type: web
    name: predictai-mini-app
    runtime: static
    rootDir: mini-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_APP_URL
        sync: false

  - type: web
    name: predictai-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        value: TrypredictAI_bot
      - key: DATABASE_URL
        fromDatabase:
          name: predictai-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_API_KEY
        sync: false
      - key: POLYMARKET_API_SECRET
        sync: false
      - key: POLYMARKET_API_PASSPHRASE
        sync: false
      - key: POLYMARKET_FUNDER_ADDRESS
        sync: false
      - key: POLYMARKET_SIGNATURE_TYPE
        value: "0"
      - key: POLYMARKET_ORDER_SUBMISSION_ENABLED
        value: "false"
      - key: POLYMARKET_HOST
        value: https://clob.polymarket.com
      - key: POLYGON_CHAIN_ID
        value: "137"
      - key: POLYGON_RPC_URL
        sync: false
      - key: WALLETCONNECT_PROJECT_ID
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: worker
    name: predictai-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        value: TrypredictAI_bot
      - key: DATABASE_URL
        fromDatabase:
          name: predictai-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_HOST
        value: https://clob.polymarket.com
      - key: POLYGON_RPC_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: worker
    name: predictai-worker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: predictai-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_HOST
        value: https://clob.polymarket.com

  - type: worker
    name: predictai-beat
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: REDIS_URL
        sync: false
